services:


  db:
    build: db
    volumes:
      - db-data:/var/lib/postgresql


  db_updater:
    build: db_updater
    depends_on:
      db:
        condition: service_healthy



  api:
    build:
      context: api
      target: prod
    depends_on:
      db_updater:
        condition: service_completed_successfully


  frontend:
    build: frontend
    depends_on:
      - api

volumes:
  db-data:

